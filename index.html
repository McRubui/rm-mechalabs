<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:#050b16;
color:white;
line-height:1.6;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h2{
background:linear-gradient(90deg,#8a7cff,#3bd1ff);
-webkit-background-clip:text;
color:transparent;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav ul li a:hover{
color:#4ecbff;
}

/* HERO */

.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url("https://images.unsplash.com/photo-1581093458791-9f3c3900df9b?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
display:flex;
align-items:center;
padding:0 8%;
position:relative;
}

.hero h1{
font-size:65px;
background:linear-gradient(90deg,#8b6cff,#3bd1ff);
-webkit-background-clip:text;
color:transparent;
}

.tagline{
color:#a78bfa;
margin-top:10px;
}

.hero p{
margin-top:25px;
